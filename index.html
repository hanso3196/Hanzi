<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Hanzi Karten</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#fff7ed">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Hanzi Karten">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
:root {
  --bg:#fff7ed;
  --surface:#ffffff;
  --surface-2:#f9fafb;
  --ink:#111827;
  --muted:#6b7280;
  --line:#e5e7eb;
  --accent:#dc2626;
  --accent-dark:#991b1b;
  --accent-soft:#fee2e2;
  --good:#047857;
  --medium:#b45309;
  --hard:#be123c;
  --shadow:0 18px 48px rgba(17,24,39,.14);
  --radius:28px;
  --bottom:84px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}
body{overscroll-behavior:none}
.app-shell{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:linear-gradient(180deg,#fff7ed 0%,#fef2f2 42%,#fff 100%)}
.app-header{position:sticky;top:0;z-index:20;padding:calc(12px + env(safe-area-inset-top)) 18px 12px;background:rgba(255,247,237,.86);backdrop-filter:blur(18px);border-bottom:1px solid rgba(229,231,235,.65)}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.title-wrap{min-width:0}
.app-title{font-size:1.25rem;font-weight:900;letter-spacing:-.04em;margin:0;line-height:1.05}
.app-subtitle{font-size:.82rem;color:var(--muted);margin:4px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:68vw}
.icon-btn{width:42px;height:42px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.88);display:grid;place-items:center;color:var(--ink);font-size:1.15rem;font-weight:900;box-shadow:0 8px 20px rgba(17,24,39,.06);cursor:pointer}
.main{flex:1;padding:14px 16px calc(var(--bottom) + env(safe-area-inset-bottom) + 18px);display:grid;gap:14px;align-content:start}
.screen{display:none}.screen.active{display:grid;gap:14px}
.quick-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.85);border-radius:20px;padding:10px;box-shadow:0 10px 28px rgba(17,24,39,.06)}
.stat strong{display:block;font-size:1.05rem;letter-spacing:-.03em}.stat span{display:block;color:var(--muted);font-size:.72rem;font-weight:800;margin-top:1px}
.study-card{min-height:min(58vh,520px);background:var(--surface);border:1px solid rgba(255,255,255,.95);border-radius:36px;box-shadow:var(--shadow);display:grid;place-items:center;text-align:center;padding:28px;position:relative;overflow:hidden;cursor:pointer}
.study-card:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at top,rgba(220,38,38,.09),transparent 50%)}
.pill{position:absolute;top:16px;border-radius:999px;padding:7px 11px;font-size:.76rem;font-weight:900;z-index:1}
.pill.left{left:16px;background:var(--accent-soft);color:var(--accent-dark)}.pill.right{right:16px;background:#f3f4f6;color:var(--muted);border:1px solid var(--line)}
.pill.right.known{color:var(--good);background:#d1fae5;border-color:#a7f3d0}.pill.right.medium{color:var(--medium);background:#fef3c7;border-color:#fde68a}.pill.right.hard{color:var(--hard);background:#ffe4e6;border-color:#fecdd3}
.card-content{position:relative;z-index:1;display:grid;gap:14px;width:100%}
.hanzi{font-size:clamp(5.8rem,34vw,11rem);line-height:1;font-weight:500;font-family:"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",serif}
.pinyin{font-size:clamp(2.5rem,13vw,5rem);font-weight:900;color:var(--accent-dark);letter-spacing:-.04em}
.meaning{font-size:clamp(1.7rem,8vw,3.4rem);font-weight:900;letter-spacing:-.04em;line-height:1.08}
.examples{display:grid;gap:8px;margin-top:6px}
.example{background:var(--surface-2);border:1px solid var(--line);border-radius:17px;padding:11px;font-size:.98rem;line-height:1.38}
.hint{color:var(--muted);font-size:.92rem;line-height:1.38}
.progress-wrap{display:grid;gap:8px}
.progress-meta{display:flex;justify-content:space-between;color:var(--muted);font-size:.82rem;font-weight:800}
.progress{height:8px;background:rgba(255,255,255,.8);border:1px solid var(--line);border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#f97316);width:0%}
.actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.btn{border:0;border-radius:999px;padding:12px 16px;font-weight:900;background:var(--ink);color:#fff;cursor:pointer;font-size:.92rem}
.btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}.btn.good{background:var(--good)}.btn.medium{background:var(--medium)}.btn.hard{background:var(--hard)}.btn.danger{background:var(--accent-dark)}
.rating{display:none;grid-template-columns:1fr;gap:8px}.rating.show{display:grid}
.overview-top{display:grid;gap:10px;position:sticky;top:88px;z-index:8;background:linear-gradient(180deg,#fff7ed 0%,rgba(255,247,237,.9) 80%,transparent 100%);padding-bottom:6px}
.search{border:1px solid var(--line);border-radius:20px;padding:14px 16px;font:inherit;background:#fff;box-shadow:0 8px 20px rgba(17,24,39,.04)}
.filter-row{display:flex;gap:8px;overflow:auto;padding-bottom:2px;scrollbar-width:none}.filter-row::-webkit-scrollbar{display:none}
.chip{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:9px 13px;font-weight:850;white-space:nowrap;cursor:pointer}.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:10px}
.tile{min-height:112px;border:1px solid var(--line);border-radius:22px;background:#fff;color:var(--ink);display:grid;gap:4px;text-align:center;align-content:center;padding:10px;position:relative;box-shadow:0 8px 18px rgba(17,24,39,.05);cursor:pointer}
.tile.known{opacity:.55;background:#f0fdf4}.tile.known:after{content:"✓";position:absolute;top:7px;right:10px;color:var(--good);font-weight:900}
.tile .char{font-size:2.35rem;line-height:1;font-family:"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",serif;color:var(--ink)}.tile .pin{font-size:.78rem;font-weight:900;color:var(--accent-dark);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.tile .mean{font-size:.72rem;color:var(--muted);line-height:1.18;max-height:2.3em;overflow:hidden}
.err{position:absolute;top:7px;left:8px;background:#ffe4e6;color:var(--hard);border-radius:999px;font-size:.68rem;font-weight:900;padding:2px 7px}
.settings-card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:16px;display:grid;gap:14px;box-shadow:0 12px 28px rgba(17,24,39,.06)}
label{font-size:.84rem;font-weight:900;color:var(--muted);display:grid;gap:7px}select,input,textarea{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px;font:inherit;background:#fff;color:var(--ink);outline:none}textarea{min-height:100px;resize:vertical}
.small{color:var(--muted);font-size:.84rem;line-height:1.38;margin:0}
.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:30;padding:8px 14px calc(8px + env(safe-area-inset-bottom));background:rgba(255,255,255,.88);backdrop-filter:blur(20px);border-top:1px solid rgba(229,231,235,.9);display:grid;grid-template-columns:1fr 1fr 72px 1fr;gap:8px;align-items:center}
.nav-btn{border:0;background:transparent;color:var(--muted);display:grid;gap:2px;place-items:center;font-size:.72rem;font-weight:900;cursor:pointer;padding:8px 4px;border-radius:18px}.nav-btn span{font-size:1.25rem;line-height:1}.nav-btn.active{color:var(--accent);background:var(--accent-soft)}
.fab{width:62px;height:62px;border-radius:22px;border:0;background:var(--accent);color:#fff;font-size:2rem;font-weight:700;box-shadow:0 14px 30px rgba(220,38,38,.35);cursor:pointer;display:grid;place-items:center;margin-top:-30px}
.sheet-backdrop{position:fixed;inset:0;background:rgba(17,24,39,.32);z-index:50;display:none;align-items:flex-end}.sheet-backdrop.show{display:flex}
.sheet{width:100%;max-height:88dvh;overflow:auto;background:#fff;border-radius:30px 30px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom));box-shadow:0 -20px 50px rgba(17,24,39,.2);display:grid;gap:12px}
.sheet-handle{width:46px;height:5px;background:#d1d5db;border-radius:999px;margin:0 auto 4px}.sheet-title{font-size:1.2rem;font-weight:950;letter-spacing:-.04em;margin:0}
.sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.empty{padding:28px;text-align:center;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:22px;line-height:1.45}
@media(min-width:780px){.app-shell{max-width:520px;margin:0 auto;box-shadow:0 0 0 1px var(--line)}body{background:#e5e7eb}.study-card{min-height:560px}}
</style>
</head>
<body>
<div class="app-shell">
  <header class="app-header">
    <div class="header-row">
      <div class="title-wrap">
        <h1 class="app-title">Hanzi Karten</h1>
        <p id="headerSubtitle" class="app-subtitle">Paket 1 · Lernen</p>
      </div>
      <button id="quickFlipBtn" class="icon-btn" aria-label="Karte umdrehen">↻</button>
    </div>
  </header>

  <main class="main">
    <section id="learnScreen" class="screen active">
      <div class="quick-stats">
        <div class="stat"><strong id="totalStat">0</strong><span>Karten</span></div>
        <div class="stat"><strong id="knownStat">0</strong><span>Kann ich</span></div>
        <div class="stat"><strong id="hardStat">0</strong><span>Schwer</span></div>
        <div class="stat"><strong id="errorStat">0</strong><span>Fehler</span></div>
      </div>

      <div class="progress-wrap">
        <div class="progress-meta"><span id="counter">Karte 1 von 1</span><span id="sideCounter">Seite 1/3</span></div>
        <div class="progress"><span id="progressBar"></span></div>
      </div>

      <article id="flashcard" class="study-card" tabindex="0" role="button">
        <span id="sideLabel" class="pill left">Schriftzeichen</span>
        <span id="statusPill" class="pill right">Neu</span>
        <div id="cardContent" class="card-content"></div>
      </article>

      <div id="ratingPanel" class="rating">
        <button id="wrongBtn" class="btn hard">Falsch / häufiger üben</button>
        <button id="mediumBtn" class="btn medium">Geht so</button>
        <button id="knownBtn" class="btn good">Kann ich ✓</button>
      </div>

      <div class="actions">
        <button id="prevBtn" class="btn secondary">Zurück</button>
        <button id="flipBtn" class="btn">Aufdecken</button>
        <button id="nextBtn" class="btn secondary">Weiter</button>
      </div>
    </section>

    <section id="overviewScreen" class="screen">
      <div class="overview-top">
        <input id="searchInput" class="search" placeholder="Suchen">
        <div class="filter-row">
          <button class="chip active" data-filter="all">Alle</button>
          <button class="chip" data-filter="not-known">Nicht abgehakt</button>
          <button class="chip" data-filter="errors">Fehler</button>
          <button class="chip" data-filter="known">Kann ich</button>
          <button class="chip" data-filter="hard">Schwer</button>
        </div>
      </div>
      <div id="overviewGrid" class="grid"></div>
    </section>

    <section id="settingsScreen" class="screen">
      <div class="settings-card">
        <label>Paket auswählen
          <select id="packSelect"></select>
        </label>
        <label>Abfragemodus
          <select id="directionSelect">
            <option value="hanzi-first">Hanzi → Pinyin → Deutsch</option>
            <option value="german-first">Deutsch → Hanzi/Pinyin</option>
          </select>
        </label>
        <p id="directionHelp" class="small">Standard: zuerst chinesisches Zeichen sehen.</p>
      </div>

      <div class="settings-card">
        <button id="shuffleBtn" class="btn secondary">Aktuelles Paket mischen</button>
        <button id="resetCardBtn" class="btn secondary">Aktuelle Karte zurücksetzen</button>
        <button id="resetErrorsBtn" class="btn secondary">Fehler im Paket zurücksetzen</button>
        <button id="exportBtn" class="btn secondary">Daten exportieren</button>
        <label class="btn secondary" style="text-align:center">Daten importieren
          <input id="importFile" type="file" accept="application/json" style="display:none">
        </label>
        <p class="small">Lernstände bleiben lokal auf deinem Gerät. Nutze Export als Backup.</p>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-screen="learnScreen"><span>卡</span>Lernen</button>
    <button class="nav-btn" data-screen="overviewScreen"><span>▦</span>Überblick</button>
    <button id="addBtn" class="fab" aria-label="Karte hinzufügen">+</button>
    <button class="nav-btn" data-screen="settingsScreen"><span>⚙</span>Optionen</button>
  </nav>
</div>

<div id="cardSheet" class="sheet-backdrop">
  <section class="sheet" role="dialog" aria-modal="true">
    <div class="sheet-handle"></div>
    <h2 id="sheetTitle" class="sheet-title">Karte hinzufügen</h2>
    <input type="hidden" id="editId" value="">
    <label>Chinesisches Schriftzeichen<input id="hanziInput" placeholder="z. B. 学"></label>
    <label>Pinyin<input id="pinyinInput" placeholder="z. B. xué"></label>
    <label>Übersetzung / Bedeutung<input id="meaningInput" placeholder="z. B. lernen; studieren"></label>
    <label>Beispielwörter<textarea id="examplesInput" placeholder="Ein Beispiel pro Zeile"></textarea></label>
    <div class="sheet-actions">
      <button id="cancelEditBtn" class="btn secondary">Abbrechen</button>
      <button id="saveBtn" class="btn">Speichern</button>
    </div>
    <button id="deleteBtn" class="btn danger">Diese Karte löschen</button>
  </section>
</div>

<script>
const STORAGE_KEY = "hanzi_flashcards_v4_1";
const LEGACY_KEYS = ["hanzi_flashcards_v4","hanzi_flashcards_v3"];
const DEFAULT_PACKS = [{"id":"pack-1","name":"Paket 1 · Häufige Zeichen 1–100","cards":[{"hanzi":"的","pinyin":"de","meaning":"Genitiv-/Attributpartikel; von","examples":["我的 — wǒ de — mein/meine","好的 — hǎo de — gut; okay","大的 — dà de — das Große"],"wrongCount":0,"status":"new","seenCount":0,"correctCount":0,"lastSeen":null},{"hanzi":"一","pinyin":"yī","meaning":"eins; ein/e","examples":["一个 — yí gè — ein Stück/eine Person","一天 — yì tiān — ein Tag","第一 — dì yī — der/die/das Erste"],"wrongCount":0,"status":"new","seenCount":0,"correctCount":0,"lastSeen":null},{"hanzi":"是","pinyin":"shì","meaning":"sein; ja/richtig sein","examples":["是的 — shì de — ja; richtig","不是 — bú shì — nicht sein","我是 — wǒ shì — ich bin"],"wrongCount":0,"status":"new","seenCount":0,"correctCount":0,"lastSeen":null},{"hanzi":"不","pinyin":"bù","meaning":"nicht; nein","examples":["不是 — bú shì — ist nicht","不好 — bù hǎo — nicht gut","不用 — bú yòng — nicht nötig"],"wrongCount":0,"status":"new","seenCount":0,"correctCount":0,"lastSeen":null},{"hanzi":"了","pinyin":"le","meaning":"Aspektpartikel; Veränderung/Abschluss","examples":["好了 — hǎo le — fertig; gut geworden","来了 — lái le — ist gekommen","吃了 — chī le — gegessen haben"],"wrongCount":0,"status":"new","seenCount":0,"correctCount":0,"lastSeen":null},{"hanzi":"在","pinyin":"zài","meaning":"sich befinden; in/an/bei; gerade","examples":["现在 — xiànzài — jetzt","在家 — zài jiā — zu Hause sein","正在 — zhèngzài — gerade dabei sein"],"wrongCount":0,"status":"new","seenCount":0,"correctCount":0,"lastSeen":null},{"hanzi":"人","pinyin":"rén","meaning":"Mensch; Person","examples":["中国人 — Zhōngguórén — Chinese/Chinesin","人民 — rénmín — Volk","工人 — gōngrén — Arbeiter/in"],"wrongCount":0,"status":"new","seenCount":0,"correctCount":0,"lastSeen":null},{"hanzi":"有","pinyin":"yǒu","meaning":"haben; es gibt","examples":["没有 — méi yǒu — nicht haben; es gibt nicht","有钱 — yǒu qián — Geld haben","有名 — yǒumíng — bekannt"],"wrongCount":0,"status":"new","seenCount":0,"correctCount":0," function applyEnrichment(card) {
  const e = ENRICHMENT[card.hanzi];
  if (!e) return card;
  const oldPlaceholder = card.pinyin === "noch ergänzen" || card.meaning === "Bedeutung noch ergänzen" ||
    (Array.isArray(card.examples) && card.examples.length === 1 && card.examples[0] === "Beispielwörter können über Bearbeiten ergänzt werden.");
  if (oldPlaceholder) {
    card.pinyin = e.pinyin;
    card.meaning = e.meaning;
    card.examples = [
      `${card.hanzi} — ${e.pinyin} — ${e.meaning}`,
      `${card.hanzi}字 — ${e.pinyin} zì — Schriftzeichen mit „${card.hanzi}“`
    ];
  }
  return card;
}

function normalizeCard(card, packId, index){
  const normalized = {
    id:card.id || `${packId}-${index}-${card.hanzi||"card"}-${Math.random().toString(36).slice(2,7)}`,
    packId:card.packId || packId,
    hanzi:String(card.hanzi||"").trim(),
    pinyin:String(card.pinyin||"").trim(),
    meaning:String(card.meaning||"").trim(),
    examples:Array.isArray(card.examples)?card.examples.map(String):[],
    status:card.status||"new",
    correctCount:Number(card.correctCount||0),
    seenCount:Number(card.seenCount||0),
    wrongCount:Number(card.wrongCount||0),
    lastSeen:card.lastSeen||null
  };
  return applyEnrichment(normalized);
}
function normalizePack(pack){return {id:pack.id,name:pack.name,cards:(pack.cards||[]).map((c,i)=>normalizeCard(c,pack.id,i))};}
function loadPacks(){
  try{const saved=JSON.parse(localStorage.getItem(STORAGE_KEY));if(Array.isArray(saved)&&saved.length)return saved.map(normalizePack);}catch(e){}
  for(const k of LEGACY_KEYS){try{const legacy=JSON.parse(localStorage.getItem(k));if(Array.isArray(legacy)&&legacy.length)return legacy.map(normalizePack);}catch(e){}}
  return DEFAULT_PACKS.map(normalizePack);
}
function savePacks(){localStorage.setItem(STORAGE_KEY,JSON.stringify(packs));renderStats();}
function allCards(){return packs.flatMap(p=>p.cards);}
function getSelectedPack(){return packs.find(p=>p.id===selectedPackId)||packs[0];}
function isErrorPack(){return selectedPackId==="errors";}
function currentCards(){
  if(isErrorPack()) return allCards().filter(c=>c.wrongCount>0).sort((a,b)=>b.wrongCount-a.wrongCount).slice(0,100);
  return getSelectedPack().cards;
}
function currentCard(){return currentCards()[currentIndex];}
function findCardById(id){return allCards().find(c=>c.id===id);}
function escapeHtml(str){return String(str??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
function statusLabel(s){return s==="known"?"Kann ich ✓":s==="medium"?"Geht so":s==="hard"?"Schwer":"Neu";}
function statusClass(s){return s==="known"?"known":s==="medium"?"medium":s==="hard"?"hard":"";}
function activeLabels(){return studyDirection==="german-first"?["Deutsch","Hanzi","Pinyin & Beispiele"]:["Schriftzeichen","Pinyin","Bedeutung & Beispiele"];}
function weightFor(card){return card.status==="known"?0.03:card.status==="medium"?1:card.status==="hard"?2.5:1.4+Math.min(card.wrongCount||0,8)*.35;}
function pickWeightedNext(){
  const cards=currentCards(); if(!cards.length)return 0;if(cards.length===1)return 0;
  let pool=cards.map((card,index)=>({index,weight:isErrorPack()?1+Math.min(card.wrongCount||0,20):weightFor(card)})).filter(x=>x.index!==currentIndex);
  let total=pool.reduce((s,x)=>s+x.weight,0), r=Math.random()*total;
  for(const x of pool){r-=x.weight;if(r<=0)return x.index;}return pool[pool.length-1].index;
}
function examplesHtml(card){return (card.examples||[]).filter(Boolean).map(ex=>`<div class="example">${escapeHtml(ex)}</div>`).join("") || '<div class="example">Keine Beispiele eingetragen.</div>';}
function cardFrontHtml(card){return studyDirection==="german-first"?`<div class="meaning">${escapeHtml(card.meaning)}</div><div class="hint">Erinnere dich an das chinesische Zeichen.</div>`:`<div class="hanzi">${escapeHtml(card.hanzi)}</div><div class="hint">Tippen zum Aufdecken</div>`;}
function cardMiddleHtml(card){return studyDirection==="german-first"?`<div class="hanzi">${escapeHtml(card.hanzi)}</div><div class="hint">Tippen für Pinyin und Beispiele</div>`:`<div class="pinyin">${escapeHtml(card.pinyin)}</div><div class="hint">${escapeHtml(card.hanzi)}</div>`;}
function cardBackHtml(card){return studyDirection==="german-first"?`<div class="pinyin">${escapeHtml(card.pinyin)}</div><div class="hint">${escapeHtml(card.hanzi)} · ${escapeHtml(card.meaning)}</div><div class="examples">${examplesHtml(card)}</div>`:`<div class="meaning">${escapeHtml(card.meaning)}</div><div class="examples">${examplesHtml(card)}</div>`;}
function renderPackSelect(){
  els.packSelect.innerHTML=packs.map(p=>`<option value="${p.id}">${escapeHtml(p.name)}</option>`).join("")+`<option value="errors">Häufigste Fehler</option>`;
  els.packSelect.value=selectedPackId;
}
function renderDirection(){
  els.directionSelect.value=studyDirection;
  els.directionHelp.textContent=studyDirection==="german-first"?"Du siehst zuerst Deutsch und musst Hanzi erinnern.":"Du siehst zuerst Hanzi und deckst Pinyin/Deutsch auf.";
}
function renderStats(){
  const cards=currentCards();
  els.totalStat.textContent=cards.length;
  els.knownStat.textContent=cards.filter(c=>c.status==="known").length;
  els.hardStat.textContent=cards.filter(c=>c.status==="hard").length;
  els.errorStat.textContent=cards.reduce((s,c)=>s+Number(c.wrongCount||0),0);
  const packName=isErrorPack()?"Häufigste Fehler":(getSelectedPack()?.name||"Paket");
  els.headerSubtitle.textContent=packName.replace(" · ", " · ");
}
function renderCard(){
  renderStats(); const cards=currentCards(); if(currentIndex>=cards.length)currentIndex=0;
  if(!cards.length){
    els.counter.textContent="Keine Karten";els.sideCounter.textContent="Seite 0/3";els.progressBar.style.width="0%";els.sideLabel.textContent="Leer";els.statusPill.textContent="Leer";els.statusPill.className="pill right";
    els.cardContent.innerHTML='<div class="empty">Hier sind noch keine Karten. Im Fehlerpaket erscheinen Karten erst nach „Falsch“.</div>';els.ratingPanel.classList.remove("show");renderOverview();return;
  }
  const card=currentCard(), labels=activeLabels();
  els.counter.textContent=`Karte ${currentIndex+1} von ${cards.length}`;els.sideCounter.textContent=`Seite ${side+1}/3`;els.progressBar.style.width=`${((currentIndex+1)/cards.length)*100}%`;
  els.sideLabel.textContent=labels[side];els.statusPill.textContent=statusLabel(card.status);els.statusPill.className=`pill right ${statusClass(card.status)}`;els.ratingPanel.classList.toggle("show",side===2);
  els.cardContent.innerHTML=side===0?cardFrontHtml(card):side===1?cardMiddleHtml(card):cardBackHtml(card);
  renderOverview();
}
function nextSide(){if(!currentCards().length)return;side=(side+1)%3;renderCard();}
function nextCard(weighted=true){if(!currentCards().length)return;history.push(currentIndex);currentIndex=weighted?pickWeightedNext():(currentIndex+1)%currentCards().length;side=0;renderCard();}
function prevCard(){if(!currentCards().length)return;currentIndex=history.length?history.pop():(currentIndex-1+currentCards().length)%currentCards().length;side=0;renderCard();}
function rateCurrent(status){const card=currentCard();if(!card)return;card.status=status==="wrong"?"hard":status;card.seenCount++;if(status==="known")card.correctCount++;if(status==="wrong")card.wrongCount++;card.lastSeen=new Date().toISOString();savePacks();nextCard(true);}
function switchScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.toggle("active",s.id===id));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.screen===id));
  if(id==="overviewScreen")renderOverview();
  if(id==="settingsScreen"){renderPackSelect();renderDirection();}
}
function clearEditor(){els.editId.value="";els.hanziInput.value="";els.pinyinInput.value="";els.meaningInput.value="";els.examplesInput.value="";els.sheetTitle.textContent="Karte hinzufügen";els.deleteBtn.style.display="none";}
function openSheet(card=null){
  if(card){els.editId.value=card.id;els.hanziInput.value=card.hanzi;els.pinyinInput.value=card.pinyin;els.meaningInput.value=card.meaning;els.examplesInput.value=(card.examples||[]).join("\n");els.sheetTitle.textContent="Karte bearbeiten";els.deleteBtn.style.display="block";}
  else{clearEditor();}
  els.cardSheet.classList.add("show");setTimeout(()=>els.hanziInput.focus(),80);
}
function closeSheet(){els.cardSheet.classList.remove("show");}
function saveFromEditor(){
  const data={hanzi:els.hanziInput.value.trim(),pinyin:els.pinyinInput.value.trim(),meaning:els.meaningInput.value.trim(),examples:els.examplesInput.value.split("\n").map(x=>x.trim()).filter(Boolean)};
  if(!data.hanzi||!data.pinyin||!data.meaning){alert("Bitte mindestens Schriftzeichen, Pinyin und Bedeutung ausfüllen.");return;}
  const editId=els.editId.value;
  if(editId)Object.assign(findCardById(editId),data);
  else{if(isErrorPack()){alert("Neue Karten bitte in einem normalen Paket anlegen.");return;}const p=getSelectedPack();p.cards.push(normalizeCard(data,p.id,p.cards.length));currentIndex=p.cards.length-1;}
  savePacks();side=0;closeSheet();renderCard();switchScreen("learnScreen");
}
function deleteCurrentOrEdited(){
  const id=els.editId.value || currentCard()?.id; const card=findCardById(id); if(!card)return;
  if(!confirm(`Karte "${card.hanzi}" wirklich löschen?`))return;
  const p=packs.find(p=>p.id===card.packId);p.cards=p.cards.filter(c=>c.id!==card.id);currentIndex=0;side=0;savePacks();closeSheet();renderCard();renderOverview();
}
function resetCurrent(){const card=currentCard();if(!card)return;card.status="new";card.correctCount=0;card.seenCount=0;card.wrongCount=0;card.lastSeen=null;savePacks();renderCard();}
function resetErrorsInCurrent(){
  const cards=currentCards();if(!cards.length)return;if(!confirm("Fehlerzähler für die sichtbaren Karten zurücksetzen?"))return;
  cards.forEach(c=>{c.wrongCount=0;if(c.status==="hard")c.status="new";});currentIndex=0;savePacks();renderCard();renderOverview();
}
function shuffleCurrent(){
  if(isErrorPack()){alert("Das Fehlerpaket ist automatisch nach Fehlerhäufigkeit sortiert.");return;}
  const p=getSelectedPack();for(let i=p.cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p.cards[i],p.cards[j]]=[p.cards[j],p.cards[i]];}currentIndex=0;side=0;history=[];savePacks();renderCard();
}
function exportCards(){const blob=new Blob([JSON.stringify(packs,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`hanzi-karten-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);}
function importCards(file){const reader=new FileReader();reader.onload=()=>{try{const imported=JSON.parse(reader.result);if(!Array.isArray(imported))throw new Error();packs=imported.map(normalizePack);selectedPackId=packs[0]?.id||"pack-1";localStorage.setItem("hanzi_selected_pack_v4_1",selectedPackId);currentIndex=0;side=0;history=[];savePacks();renderPackSelect();renderCard();renderOverview();}catch(e){alert("Import fehlgeschlagen.");}};reader.readAsText(file);}
function openCardById(id){const card=findCardById(id);if(!card)return;selectedPackId=card.packId;localStorage.setItem("hanzi_selected_pack_v4_1",selectedPackId);renderPackSelect();currentIndex=currentCards().findIndex(c=>c.id===id);if(currentIndex<0)currentIndex=0;side=0;history=[];switchScreen("learnScreen");renderCard();}
function renderOverview(){
  let q=(els.searchInput.value||"").toLowerCase().trim();
  let rows=currentCards().map(card=>({card}));
  if(q)rows=rows.filter(({card})=>[card.hanzi,card.pinyin,card.meaning,...(card.examples||[])].join(" ").toLowerCase().includes(q));
  if(activeFilter==="known")rows=rows.filter(({card})=>card.status==="known");
  if(activeFilter==="not-known")rows=rows.filter(({card})=>card.status!=="known");
  if(activeFilter==="errors")rows=rows.filter(({card})=>Number(card.wrongCount||0)>0);
  if(activeFilter==="hard")rows=rows.filter(({card})=>card.status==="hard");
  rows.sort((a,b)=>(b.card.wrongCount||0)-(a.card.wrongCount||0));
  if(!rows.length){els.overviewGrid.innerHTML='<div class="empty">Keine passenden Karten gefunden.</div>';return;}
  els.overviewGrid.innerHTML=rows.map(({card})=>`<button class="tile ${card.status==="known"?"known":""}" data-open="${escapeHtml(card.id)}" data-edit="${escapeHtml(card.id)}">${card.wrongCount?`<span class="err">×${card.wrongCount}</span>`:""}<span class="char">${escapeHtml(card.hanzi)}</span><span class="pin">${escapeHtml(card.pinyin)}</span><span class="mean">${escapeHtml(card.meaning)}</span></button>`).join("");
  document.querySelectorAll("[data-open]").forEach(btn=>btn.addEventListener("click",()=>openCardById(btn.dataset.open)));
}

els.flashcard.addEventListener("click",nextSide);els.quickFlipBtn.addEventListener("click",nextSide);els.flipBtn.addEventListener("click",nextSide);
els.nextBtn.addEventListener("click",()=>nextCard(true));els.prevBtn.addEventListener("click",prevCard);
els.wrongBtn.addEventListener("click",()=>rateCurrent("wrong"));els.mediumBtn.addEventListener("click",()=>rateCurrent("medium"));els.knownBtn.addEventListener("click",()=>rateCurrent("known"));
document.querySelectorAll(".nav-btn").forEach(btn=>btn.addEventListener("click",()=>switchScreen(btn.dataset.screen)));
els.addBtn.addEventListener("click",()=>openSheet());
els.cancelEditBtn.addEventListener("click",closeSheet);els.saveBtn.addEventListener("click",saveFromEditor);els.deleteBtn.addEventListener("click",deleteCurrentOrEdited);
els.cardSheet.addEventListener("click",e=>{if(e.target===els.cardSheet)closeSheet();});
els.packSelect.addEventListener("change",()=>{selectedPackId=els.packSelect.value;localStorage.setItem("hanzi_selected_pack_v4_1",selectedPackId);currentIndex=0;side=0;history=[];renderCard();renderOverview();});
els.directionSelect.addEventListener("change",()=>{studyDirection=els.directionSelect.value;localStorage.setItem("hanzi_study_direction_v4_1",studyDirection);side=0;renderDirection();renderCard();});
els.searchInput.addEventListener("input",renderOverview);
document.querySelectorAll(".chip").forEach(chip=>chip.addEventListener("click",()=>{document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));chip.classList.add("active");activeFilter=chip.dataset.filter;renderOverview();}));
els.shuffleBtn.addEventListener("click",shuffleCurrent);els.resetCardBtn.addEventListener("click",resetCurrent);els.resetErrorsBtn.addEventListener("click",resetErrorsInCurrent);
els.exportBtn.addEventListener("click",exportCards);els.importFile.addEventListener("change",e=>{if(e.target.files[0])importCards(e.target.files[0]);e.target.value="";});
document.addEventListener("keydown",e=>{if(["INPUT","TEXTAREA","SELECT"].includes(document.activeElement.tagName))return;if(e.key===" "){e.preventDefault();nextSide();}else if(e.key==="ArrowRight")nextCard(true);else if(e.key==="ArrowLeft")prevCard();});
renderPackSelect();renderDirection();renderCard();renderOverview();

if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js").catch(()=>{}));}
</script>
</body>
</html>
